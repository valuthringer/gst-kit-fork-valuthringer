name: Release (prebuilds)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-prebuilds:
    name: Build prebuilds (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        # Build for multiple Node versions to generate multiple N-API prebuilds.
        # This improves "npm i without Build Tools" compatibility.
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install GStreamer + pkg-config (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          choco install -y pkgconfiglite
          choco install -y gstreamer gstreamer-devel

          # Robustly locate gstreamer-1.0.pc (Chocolatey layout can vary)
          $searchRoots = @(
            'C:\\Program Files\\gstreamer',
            'C:\\gstreamer',
            'C:\\ProgramData\\chocolatey\\lib'
          )

          $pcFile = $null
          foreach ($root in $searchRoots) {
            if (-not (Test-Path $root)) { continue }
            $hit = Get-ChildItem -Path $root -Recurse -Filter 'gstreamer-1.0.pc' -ErrorAction SilentlyContinue |
              Select-Object -First 1
            if ($hit) { $pcFile = $hit.FullName; break }
          }

          if (-not $pcFile) {
            throw 'Could not locate gstreamer-1.0.pc after choco install gstreamer-devel'
          }

          $pkgconfigPath = Split-Path -Parent $pcFile
          "PKG_CONFIG_PATH=$pkgconfigPath" | Out-File -FilePath $env:GITHUB_ENV -Append

          # Also set a root hint if we can infer it from the path
          # ...\<version>\msvc_x86_64\lib\pkgconfig
          if ($pcFile -match '(.*\\msvc_x86_64)\\lib\\pkgconfig\\gstreamer-1\.0\.pc$') {
            $gstRoot = $Matches[1]
            "GSTREAMER_1_0_ROOT_MSVC_X86_64=$gstRoot" | Out-File -FilePath $env:GITHUB_ENV -Append
          }

          pkg-config --version
          pkg-config --exists gstreamer-1.0
          if ($LASTEXITCODE -ne 0) { throw 'pkg-config cannot find gstreamer-1.0' }

      - name: Install GStreamer dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            python3 \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libgstreamer-plugins-bad1.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-ugly \
            gstreamer1.0-libav \
            pkg-config

      - name: Install GStreamer dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew update
          brew install gstreamer gst-plugins-base gst-plugins-good gst-plugins-bad gst-plugins-ugly pkg-config
          echo "PKG_CONFIG_PATH=$(brew --prefix)/lib/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV
          echo "LIBRARY_PATH=$(brew --prefix)/lib:$LIBRARY_PATH" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=$(brew --prefix)/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript dist
        run: npm run build:ts

      - name: Build prebuilds (N-API)
        run: npm run prebuild

      - name: Upload prebuilds artifact
        uses: actions/upload-artifact@v4
        with:
          name: prebuilds-${{ matrix.os }}-node${{ matrix.node-version }}
          path: prebuilds/

  publish:
    name: Publish npm package
    needs: [build-prebuilds]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript dist
        run: npm run build:ts

      - name: Download prebuilds artifacts
        uses: actions/download-artifact@v4
        with:
          path: _prebuilds

      - name: Merge prebuilds
        run: |
          rm -rf prebuilds
          mkdir -p prebuilds
          find _prebuilds -type f -path '*/prebuilds/*' -print -exec bash -lc 'dst="prebuilds/${1#*prebuilds/}"; mkdir -p "$(dirname "$dst")"; cp -f "$1" "$dst"' _ {} \;

      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish
