name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [20.x, lts/*, node]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install GStreamer dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            python3 \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libgstreamer-plugins-bad1.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-ugly \
            gstreamer1.0-libav \
            pkg-config

      - name: Install GStreamer dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          export HOMEBREW_NO_AUTO_UPDATE=1
          export HOMEBREW_NO_INSTALL_CLEANUP=1
          brew install pkg-config gstreamer gst-plugins-base
          echo "PKG_CONFIG_PATH=$(brew --prefix gstreamer)/lib/pkgconfig:$(brew --prefix)/lib/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV
          echo "LIBRARY_PATH=$(brew --prefix gstreamer)/lib:$(brew --prefix)/lib:$LIBRARY_PATH" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=$(brew --prefix gstreamer)/lib:$(brew --prefix)/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV

      - name: Install GStreamer + pkg-config (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          choco install -y pkgconfiglite
          choco install -y gstreamer gstreamer-devel

          $searchRoots = @(
            'C:\\Program Files\\gstreamer',
            'C:\\gstreamer',
            'C:\\ProgramData\\chocolatey\\lib'
          )

          $pcFile = $null
          foreach ($root in $searchRoots) {
            if (-not (Test-Path $root)) { continue }
            $hit = Get-ChildItem -Path $root -Recurse -Filter 'gstreamer-1.0.pc' -ErrorAction SilentlyContinue |
              Select-Object -First 1
            if ($hit) { $pcFile = $hit.FullName; break }
          }

          if (-not $pcFile) {
            throw 'Could not locate gstreamer-1.0.pc after choco install gstreamer-devel'
          }

          $pkgconfigPath = Split-Path -Parent $pcFile
          "PKG_CONFIG_PATH=$pkgconfigPath" | Out-File -FilePath $env:GITHUB_ENV -Append

          if ($pcFile -match '(.*\\msvc_x86_64)\\lib\\pkgconfig\\gstreamer-1\.0\.pc$') {
            $gstRoot = $Matches[1]
            "GSTREAMER_1_0_ROOT_MSVC_X86_64=$gstRoot" | Out-File -FilePath $env:GITHUB_ENV -Append
          }

          pkg-config --modversion gstreamer-1.0
          if ($LASTEXITCODE -ne 0) { throw 'pkg-config cannot find gstreamer-1.0' }

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build project
        run: npm run build

      - name: Lint code
        run: npm run lint

      - name: Run Node.js tests
        run: npm run test:node

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Run Bun tests
        run: npm run test:bun

      - name: Run unit tests
        run: npm run test:unit
